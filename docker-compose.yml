services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file:
      - .env.docker
    depends_on:
      - mongo
      - redis
    ports:
      - "4000:4000"

  backend-worker:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    command: ["node", "dist/worker.js"]
    env_file:
      - .env.docker
    depends_on:
      - mongo
      - redis

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mongo_data:
  
mongodb://localhost:27017